<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Multi-Frecuencia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #controls { 
            position: absolute; top: 0; width: 100%; padding: 15px; 
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; 
            gap: 20px; z-index: 100; border-bottom: 1px solid #333;
        }
        .upload-btn { background: #444; padding: 8px; border-radius: 4px; cursor: pointer; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff5e4d; }
        .label { font-size: 12px; display: block; margin-bottom: 5px; color: #aaa; }
    </style>
</head>
<body>

    <div id="controls">
        <div>
            <span class="label">1. Fondo (Reacciona a Bajos)</span>
            <input type="file" id="bgInput" accept="image/*">
        </div>
        <div>
            <span class="label">2. Objeto (Reacciona a Medios/Altos)</span>
            <input type="file" id="fgInput" accept="image/*">
        </div>
        <button onclick="startAudio()">INICIAR ANÁLISIS</button>
    </div>

    <script>
        let imgBg, imgFg;
        let mic, fft;
        let canDraw = false;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            
            // Inicializar FFT para análisis de frecuencias
            fft = new p5.FFT();
            
            document.getElementById('bgInput').addEventListener('change', (e) => handleFile(e, 'bg'));
            document.getElementById('fgInput').addEventListener('change', (e) => handleFile(e, 'fg'));
        }

        function startAudio() {
            userStartAudio();
            mic = new p5.AudioIn();
            mic.start();
            fft.setInput(mic);
            canDraw = true;
        }

        function handleFile(e, type) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    loadImage(event.target.result, loadedImg => {
                        if (type === 'bg') imgBg = loadedImg;
                        else imgFg = loadedImg;
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function draw() {
            background(0);

            if (!canDraw) {
                fill(255);
                textAlign(CENTER);
                text("Sube las imágenes y presiona 'INICIAR'", width/2, height/2);
                return;
            }

            // Analizar el espectro
            fft.analyze();
            
            // Obtener energía de diferentes rangos (0-255)
            let bass = fft.getEnergy("bass");        // Bajos (20-140Hz)
            let mid = fft.getEnergy("mid");          // Medios (400-2600Hz)
            let treble = fft.getEnergy("treble");    // Agudos (5200-14000Hz)

            // 1. Dibujar Fondo (Reacciona a los Bajos con "Shake" y Escala)
            if (imgBg) {
                push();
                let shake = map(bass, 150, 255, 0, 15); // Solo vibra si el bajo es fuerte
                let zoomBg = map(bass, 0, 255, 1, 1.05);
                translate(width / 2 + random(-shake, shake), height / 2 + random(-shake, shake));
                imageMode(CENTER);
                scale(zoomBg);
                // Ajustar imagen al tamaño de pantalla
                let aspect = imgBg.width / imgBg.height;
                image(imgBg, 0, 0, width, width / aspect);
                pop();
            }

            // 2. Dibujar Imagen Superior (Reacciona a Medios y Agudos)
            if (imgFg) {
                push();
                imageMode(CENTER);
                translate(width / 2, height / 2);
                
                // Los medios afectan el tamaño
                let scaleFg = map(mid, 0, 255, 0.5, 2.0);
                scale(scaleFg);
                
                // Los agudos afectan la rotación y el brillo (tint)
                let rot = map(treble, 0, 255, 0, PI/4);
                rotate(random(-rot/5, rot/5)); // Pequeño "jitter" con agudos
                
                tint(255, map(mid, 0, 255, 180, 255));
                
                // Ajustar tamaño base de la imagen de arriba
                let fgW = 300;
                image(imgFg, 0, 0, fgW, (imgFg.height * fgW) / imgFg.width);
                pop();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
